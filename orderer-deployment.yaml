apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderer
  namespace: mediblock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orderer
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: orderer
    spec:
      initContainers:
      - name: setup-msp
        image: busybox
        command: ["/bin/sh", "-c"]
        args:
          - |
            mkdir -p /mnt/data/msp/admincerts
            mkdir -p /mnt/data/msp/cacerts
            mkdir -p /mnt/data/msp/keystore
            mkdir -p /mnt/data/msp/signcerts
            mkdir -p /mnt/data/msp/tlscacerts
            
            cp /msp-data/admincerts-cert.pem /mnt/data/msp/admincerts/cert.pem
            cp /msp-data/cacerts-ca.crt /mnt/data/msp/cacerts/ca.crt
            cp /msp-secret-data/key.pem /mnt/data/msp/keystore/key.pem
            cp /msp-data/signcerts-cert.pem /mnt/data/msp/signcerts/cert.pem
            cp /msp-data/config.yaml /mnt/data/msp/config.yaml
            
            # Check if files exist
            ls -la /mnt/data/msp/signcerts
            ls -la /mnt/data/msp/admincerts
            
            chmod -R 777 /mnt/data
            
            echo "Starting orderer setup"
            echo "MSP structure:"
            find /mnt/data -type f | sort
        volumeMounts:
        - name: msp-data
          mountPath: /msp-data
        - name: msp-secret-data
          mountPath: /msp-secret-data
        - name: orderer-data
          mountPath: /mnt/data
      containers:
      - name: orderer
        image: hyperledger/fabric-orderer:2.5.4
        command: ["orderer"]
        env:
        - name: FABRIC_LOGGING_SPEC
          value: debug
        - name: ORDERER_GENERAL_LISTENADDRESS
          value: 0.0.0.0
        - name: ORDERER_GENERAL_GENESISMETHOD
          value: file
        - name: ORDERER_GENERAL_GENESISFILE
          value: /var/hyperledger/fabric/config/genesisblock
        - name: ORDERER_GENERAL_BOOTSTRAPMETHOD
          value: file
        - name: ORDERER_GENERAL_BOOTSTRAPFILE
          value: /var/hyperledger/fabric/config/genesisblock
        - name: ORDERER_GENERAL_LOCALMSPID
          value: MediBlockMSP
        - name: ORDERER_GENERAL_LOCALMSPDIR
          value: /var/hyperledger/production/msp
        - name: ORDERER_GENERAL_CHANNELPARTICIPATION_ENABLED
          value: "true"
        - name: ORDERER_GENERAL_CONFIGFILE
          value: /etc/hyperledger/fabric/orderer.yaml
        ports:
        - containerPort: 7050
        volumeMounts:
        - name: orderer-config-mount
          mountPath: /etc/hyperledger/fabric
        - name: genesis
          mountPath: /var/hyperledger/fabric/config
        - name: orderer-data
          mountPath: /var/hyperledger/production
      volumes:
      - name: msp-data
        configMap:
          name: orderer-msp
      - name: msp-secret-data
        secret:
          secretName: orderer-msp-secret
      - name: orderer-config-mount
        configMap:
          name: orderer-config
          items:
          - key: orderer.yaml
            path: orderer.yaml
      - name: genesis
        configMap:
          name: fabric-genesis
      - name: orderer-data
        emptyDir: {}
